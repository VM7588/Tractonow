<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#16a34a"/>
  <!-- Tractor body -->
  <rect x="5" y="13" width="14" height="9" rx="2" fill="#ffffff"/>
  <!-- Cabin -->
  <rect x="9" y="7"  width="9"  height="8" rx="2" fill="#bbf7d0"/>
  <!-- Exhaust -->
  <rect x="15" y="4" width="2" height="5" rx="1" fill="#ffffff"/>
  <!-- Rear wheel -->
  <circle cx="11" cy="24" r="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="11" cy="24" r="2" fill="#16a34a"/>
  <!-- Front wheel -->
  <circle cx="21" cy="24" r="3" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="21" cy="24" r="1.2" fill="#16a34a"/>
</svg>
